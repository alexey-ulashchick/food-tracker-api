name: Deploy

on:
  push:
    branches: [main]
    # Skip the deploy when only docs / non-shipping files change.
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.dockerignore'
      - 'fly.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Stop deploys from racing each other if you push twice in a row.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Node + npm for the install: Bun's parallel installer flakes on
      # ConnectionRefused inside GitHub-hosted runners. npm is reliable here.
      # Bun is still used for the typecheck script itself.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-package-lock --no-audit --no-fund
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - run: bun run typecheck

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: typecheck
    # Lets the workflow create deployments visible in the GitHub UI.
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # `--remote-only` builds the image on Fly's builder, so the runner
      # doesn't need Docker. It also caches layers across deploys.
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
