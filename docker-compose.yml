services:
  postgres:
    image: postgres:16-alpine
    container_name: food-traker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: food
      POSTGRES_PASSWORD: food
      POSTGRES_DB: food
    ports:
      - '5432:5432'
    volumes:
      - food_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U food -d food']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  food_pg_data:
